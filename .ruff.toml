exclude = [
    ".env",
    ".venv",
    ".git",
    ".git-rewrite",
    ".ruff_cache",
    "__pycache__",
]

line-length = 117
indent-width = 4
target-version = "py314"

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[format]
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
