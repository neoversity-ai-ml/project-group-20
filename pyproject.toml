[project]
name = "address-book-bot"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = []

[dependency-groups]
dev = [
    "pre-commit",
    {include-group = "lint"},
    {include-group = "test"},
]

# linting tools
lint = [
    "ruff",
]

test = [
  "pytest",
  "pytest-cov",
]

[tool.pytest.ini_options]
addopts = "--cov=. --cov-branch --cov-report=xml --doctest-modules --maxfail=1 -q"
testpaths = ["."]
